<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Kerala Heritage Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --forest: #0f2d1a;
      --leaf:   #1e5c35;
      --mid:    #2d7a50;
      --gold:   #c8922a;
      --amber:  #e8b84b;
      --cream:  #faf7f0;
      --dark:   #0a1c10;
      --muted:  #6b6b6b;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(30,92,53,0.12) 0%, transparent 70%);
      top: -150px; left: -150px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,146,42,0.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    /* ══ CARD ══ */
    .register-box {
      position: relative;
      z-index: 2;
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.8rem;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 20px 60px rgba(15,45,26,0.1);
      animation: fadeUp 0.7s ease both;
    }

    /* Brand top */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--leaf);
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 0.2rem;
    }

    .brand-divider {
      width: 32px; height: 2px;
      background: var(--gold);
      border-radius: 2px;
      margin: 0 auto;
    }

    /* Heading */
    .register-box h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--forest);
      text-align: center;
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }

    .register-box .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
    }

    /* ══ FORM ══ */
    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--forest);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      color: var(--forest);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: #aaa; }

    input:focus {
      border-color: var(--leaf);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(30,92,53,0.1);
    }

    input.input-error {
      border-color: #e05252;
      box-shadow: 0 0 0 3px rgba(224,82,82,0.1);
    }

    /* Error / Success */
    .error {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #c0392b;
      background: rgba(192,57,43,0.07);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1rem;
    }

    .error.visible { display: flex; }

    .success {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--leaf);
      background: rgba(30,92,53,0.07);
      border: 1px solid rgba(30,92,53,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      text-align: center;
    }

    .success.visible { display: flex; }

    /* Submit button */
    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: var(--forest);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.3rem;
    }

    button[type="submit"]:hover { background: var(--leaf); transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }

    /* Back link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.3rem;
      font-size: 0.82rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--leaf); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .register-box { padding: 2.5rem 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="register-box">

    <div class="brand">
      <span class="brand-name">The Kerala Heritage Hub</span>
      <div class="brand-divider"></div>
    </div>

    <h2>Register</h2>
    <p class="subtitle">Join us to explore God's Own Country</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="10-digit number">
      </div>

      <div id="errorMsg" class="error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText"></span>
      </div>

      <button type="submit">Create Account →</button>
    </form>

    <div id="successMsg" class="success">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Registration Successful! Welcome aboard.
    </div>

    <a href="index.html" class="back-link">← Back to Kerala Heritage Hub</a>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name  = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      const errorMsg  = document.getElementById("errorMsg");
      const errorText = document.getElementById("errorText");
      const successMsg = document.getElementById("successMsg");

      // Reset
      errorMsg.classList.remove("visible");
      successMsg.classList.remove("visible");
      document.querySelectorAll("input").forEach(i => i.classList.remove("input-error"));

      function showError(msg, inputId) {
        errorText.textContent = msg;
        errorMsg.classList.add("visible");
        if (inputId) document.getElementById(inputId).classList.add("input-error");
      }

      if (!name || !email || !phone) {
        showError("All fields are required.");
        if (!name)  document.getElementById("name").classList.add("input-error");
        if (!email) document.getElementById("email").classList.add("input-error");
        if (!phone) document.getElementById("phone").classList.add("input-error");
        return;
      }

      if (!/^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email)) {
        showError("Please enter a valid email address.", "email");
        return;
      }

      if (!/^[0-9]{10}$/.test(phone)) {
        showError("Phone number must be exactly 10 digits.", "phone");
        return;
      }

      successMsg.classList.add("visible");
      document.getElementById("registerForm").reset();
    });
  </script>
</body>
</html>
